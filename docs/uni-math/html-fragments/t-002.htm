<title>Strong Induction Theorem</title>

</head><body>

<figure class="math-fragment-content">
<figcaption><span class="math-fragment-id"><span class="math-fragment-type"></span>-<span class="math-fragment-number"></span></span>: <span data-selector="title"></span></figcaption>

<p>Let <math xmlns=""><mi>P</mi><mo stretchy="false">(</mo><mi>n</mi><mo stretchy="false">)</mo></math> be a family of statements, indexed by <math xmlns=""><mi>n</mi><mo>&isin;</mo><mi>&Nopf;</mi></math>. Then</p>

<p>1. Suppose that <math xmlns=""><mi>P</mi><mo stretchy="false">(</mo><mn>0</mn><mo stretchy="false">)</mo></math> is true.</p>
<p>2. Then suppose for any <math xmlns=""><mi>n</mi><mo>&isin;</mo><mi>&Nopf;</mi></math>, if <math xmlns=""><mi>P</mi><mo stretchy="false">(</mo><mn>0</mn><mo stretchy="false">)</mo><mo>,</mo><mi>P</mi><mo stretchy="false">(</mo><mn>1</mn><mo stretchy="false">)</mo><mo>,</mo><mo>&hellip;</mo><mo>,</mo><mi>P</mi><mo stretchy="false">(</mo><mi>n</mi><mo stretchy="false">)</mo></math> are true, then <math xmlns=""><mi>P</mi><mo stretchy="false">(</mo><mi>n</mi><mo>+</mo><mn>1</mn><mo stretchy="false">)</mo></math> is true.</p>
<p>3. Then <math xmlns=""><mi>P</mi><mo stretchy="false">(</mo><mi>n</mi><mo stretchy="false">)</mo></math> is true for all <math xmlns=""><mi>n</mi><mo>&isin;</mo><mi>&Nopf;</mi></math>.</p>
