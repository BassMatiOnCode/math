<p>For all <math xmlns=""><mi>n</mi><mo>,</mo><mi>k</mi><mo>&isin;</mo><mi>&Nopf;</mi></math>, we define the <em>binomial coefficient</em> as</p>

<math xmlns="" display="block">
<mrow><mo>(</mo><mfrac linethickness="0px"><mi>n</mi><mi>k</mi></mfrac><mo>)</mo></mrow>
<mo>=</mo><mmultiscripts><mi scriptlevel="-1">C</mi><mi>k</mi><mi></mi><mprescripts /><mi></mi><mi>n</mi></mmultiscripts>
<mo>=</mo><msubsup><mi scriptlevel="-1">C</mi><mi>k</mi><mi>n</mi></msubsup>
<mo>=</mo><mo>{</mo><mtable><mtr>
	<mtd style="padding-bottom: 20px"><mfrac scriptlevel="-1"><mrow><mi>n</mi><mo>!</mo></mrow><mrow style="padding: 0px 5px"><mo stretchy="false">(</mo><mi>n</mi><mo>&minus;</mo><mi>k</mi><mo stretchy="false">)</mo><mo rspace="4px">!</mo><mi>k</mi><mo>!</mo></mrow></mfrac></mtd>
	<mtd style="text-align:left"><mo>for</mo><mn>0</mn><mo>&le;</mo><mi>k</mi><mo>&le;</mo><mi>n</mi></mtd>
</mtr><mtr>
	<mtd><mn>0</mn></mtd>
	<mtd style="text-align:left"><mo>for</mo><mi>k</mi><mo>&gt;</mo><mi>n</mi></mtd>
</mtr></mtable>
