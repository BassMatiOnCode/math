<figure class="math-fragment-content">
<figcaption><span class="math-fragment-id"><span class="math-fragment-type"></span>-<span class="math-fragment-number"></span></span>: Additive and Multiplicative Identiy</figcaption>

<p>Zero and one are the additive and multiplicative identities, respectively. They don't change the value of a sum or product: </p>

<math xmlns="" display="block">
<mi>n</mi><mo>+</mo><mn>0</mn><mo>=</mo><mi>n</mi>
</math>
<math xmlns="" display="block">
<mi>n</mi><mo>&sdot;</mo><mn>1</mn><mo>=</mo><mi>n</mi>
</math>

<p>They are also called <i>neutral elements</i> for addition or multiplication, respectively.</p>

</figure>
