<math xmlns="" display="block">
<mi>m</mi><mo>&le;</mo><mi>n</mi><mo>&rarr;</mo>
<mo>&exist; </mo><mi>k</mi><mo>&isin;</mo><mi>&Nopf;</mi><mo> :</mo><mi>m</mi><mo>+</mo><mi>k</mi><mo>=</mo><mi>n</mi>
</math>
