<figcaption><span class="math-fragment-id"><span class="math-fragment-type"></span>-<span class="math-fragment-number"></span></span>: Natural Numbers</figcaption>

<p>A <em>natural number</em> is a member of the sequence 0, 1, 2, &hellip;.</p>
<p>The sequence is formed by starting from 0, then successively add 1 to obtain each member of the sequence, one after the other. We write in set notation (<a href="en.wikipedia.org/wiki/Set_(mathematics)#Roster_notation" target="_blank">Roster notation)</a>:</p>
<math xmlns="" display="block"><mi>&Nopf;</mi><mo>=</mo><mo>{</mo><mn>0</mn><mo>,</mo><mn>1</mn><mo>,</mo><mn>2</mn><mo>,</mo><mtext>&hellip;</mtext><mo>}</mo></math></figure>
