<title>Definition of a Set (Roster Notation)</title>

   </head><body>

<figure class="math-fragment-content"><figcaption><span class="math-fragment-id"><span class="math-fragment-type"></span>-<span class="math-fragment-number"></span></span>: <span data-selector="title"></span></figcaption>

<p>A <em>set</em> is a collection of "objects", called <em>elements</em> or <em>members</em> of the set. We denote a set by an italic uppercase letter and enumerate the set <math xmlns=""><msub><mi>a</mi><mn>1</mn></msub><mo>,</mo><msub><mi>a</mi><mn>2</mn></msub><mo>,&hellip;</mo><mo>,</mo><msub><mi>a</mi><mi>n</mi></msub></math> within curly braces:</p>

<math xmlns="" display="block"><mi>A</mi><mo>=</mo><mo>{</mo><msub><mi>a</mi><mn>1</mn></msub><mo>,</mo><msub><mi>a</mi><mn>2</mn></msub><mo>,&hellip;</mo><mo>,</mo><msub><mi>a</mi><mi>n</mi></msub><mo>}</mo></math>

<p>An <em>ellipsis</em> indicates that the sequence, established by the preceding elements, is to be continued.</p>
