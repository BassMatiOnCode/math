<title>Subset</title>

   </head><body>

<figure class="math-fragment-content"><figcaption><span class="math-fragment-id"><span class="math-fragment-type"></span>-<span class="math-fragment-number"></span></span>: <span data-selector="title"></span></figcaption>

<p><math xmlns=""><mi>B</mi></math> is called a <em>subset</em> of <math xmlns=""><mi>A</mi></math> if every element of <math xmlns=""><mi>B</mi></math> is also an element of <math xmlns=""><mi>A</mi><mtext>.</mtext></math> We write that as</p>

<math xmlns="" display="block"><mi>B</mi><mo>&SubsetEqual;</mo><mi>A</mi></math>

<p>If <math xmlns=""><mi>A</mi><mo>&ne;</mo><mi>B</mi></math>, then <math xmlns=""><mi>B</mi></math> is called a <em>proper subset</em>:</p>

<math xmlns="" display="block"><mi>B</mi><mo>&subset;</mo><mi>A</mi></math>

</figure></body></html>
